<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Life Series{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="noise-overlay"></div>

    <!-- Floating orbs background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                <span class="logo-en">LIFE</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">
                    <span class="nav-num">01</span>Inicio
                </a></li>
                <li><a href="/elenco" class="nav-link {% if request.endpoint == 'elenco' %}active{% endif %}">
                    <span class="nav-num">02</span>Elenco
                </a></li>
                <li><a href="/temporadas" class="nav-link {% if request.endpoint == 'temporadas' %}active{% endif %}">
                    <span class="nav-num">03</span>Temporadas
                </a></li>
                <li><a href="/galeria" class="nav-link {% if request.endpoint == 'galeria' %}active{% endif %}">
                    <span class="nav-num">04</span>Galería
                </a></li>
            </ul>
            <button class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="/">Inicio</a></li>
            <li><a href="/elenco">Elenco</a></li>
            <li><a href="/temporadas">Temporadas</a></li>
            <li><a href="/galeria">Galería</a></li>
        </ul>
    </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">
                <span class="logo-en">LIFE</span>
            </div>
            <p class="footer-text">Datos provistos por <a href="https://themoviedb.org" target="_blank">The Movie Database</a></p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
